# ==============================================================
# DEVELOPMENT ONLY - Do NOT use in production.
# For production, use docker-compose.production.yml
# ==============================================================

services:
  db:
    # pgvector/pgvector:pg17 = postgres 17 + pgvector built in.
    # Required by knowledge_chunks (RAG) and agent_memory_entries (semantic memory).
    # Plain postgres:17-alpine does NOT include pgvector; do not swap back.
    image: pgvector/pgvector:pg17
    environment:
      # DEV DEFAULTS ONLY - these are plaintext fallbacks for local development.
      # NEVER use these defaults in production. Production must use docker-compose.production.yml
      # with secrets injected via environment variables or a secrets manager.
      POSTGRES_USER: "${POSTGRES_USER:-ironworks}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ironworks}"
      POSTGRES_DB: "${POSTGRES_DB:-ironworks}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ironworks} -d ${POSTGRES_DB:-ironworks}"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    # SEC-INFRA-001: bind app port to loopback only.
    # Caddy on the host is the only public ingress; binding to 0.0.0.0 was
    # leaving the app reachable directly via the VPS public IP if the host
    # firewall ever lapsed. Mirrors the `db` service's loopback bind above.
    ports:
      - "127.0.0.1:3100:3100"
    # OPS containment for the SM heap leak that crashed at ~10h uptime
    # (V8 OOM at the ~2GB platform default). Auto-restart + headroom
    # while the leak is profiled. mem_limit must be > NODE_OPTIONS
    # max-old-space-size so docker doesn't kill V8 before V8's own GC
    # has a chance.
    restart: unless-stopped
    mem_limit: 5g
    mem_reservation: 1g
    environment:
      # Lift V8's old-space cap from the platform default (~2GB) to 4GB.
      # Buys longer runs while the actual leak source (heartbeat
      # scheduler? LLM client retain cycles? RAG cache?) is profiled.
      NODE_OPTIONS: "--max-old-space-size=4096"
      # DEV DEFAULT: override by setting POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB env vars
      DATABASE_URL: "postgres://${POSTGRES_USER:-ironworks}:${POSTGRES_PASSWORD:-ironworks}@db:5432/${POSTGRES_DB:-ironworks}"
      PORT: "3100"
      SERVE_UI: "true"
      IRONWORKS_DEPLOYMENT_MODE: "authenticated"
      IRONWORKS_DEPLOYMENT_EXPOSURE: "private"
      IRONWORKS_PUBLIC_URL: "${IRONWORKS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # LLM Provider API keys - pass through from host .env so adapters can use them
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # See docker-compose.production.yml for rationale: openrouter-api adapter
      # reads ADAPTER_OPENROUTER_API_KEY at runtime, not OPENROUTER_API_KEY.
      ADAPTER_OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
    volumes:
      - ironworks-data:/ironworks
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  ironworks-data:
