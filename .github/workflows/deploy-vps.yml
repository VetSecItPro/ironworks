name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Ironworks VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy via SSH
        # Pinned to v1.2.0 — update SHA when upgrading the action version
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        env:
          EXPECTED_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          envs: EXPECTED_SHA
          script: |
            set -euo pipefail
            cd /root/ironworks-atlas

            echo "==> Expected SHA: ${EXPECTED_SHA}"
            echo "==> Pulling latest from master (preserving VPS-local prod compose hardening)..."
            git fetch origin master
            # VPS has intentional local diverges on docker-compose.production.yml
            # (pg17 pin vs master's pg18, 127.0.0.1 binding, dropped :5432 publish).
            # Stash those before reset, then restore.
            if ! git diff --quiet docker-compose.production.yml; then
              git stash push -m "vps-prod-hardening-$(date +%s)" -- docker-compose.production.yml
              STASHED=1
            else
              STASHED=0
            fi
            git reset --hard origin/master
            if [ "$STASHED" = "1" ]; then
              git stash pop
            fi

            echo "==> Rebuilding and restarting atlas stack (no compose down - preserves volumes)..."
            docker compose -f docker-compose.production.yml up -d --build

            echo "==> Pruning old images..."
            docker image prune -f

            echo "==> Waiting for health check on :3101..."
            HEALTHY=0
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3101/api/health > /dev/null 2>&1; then
                echo "==> Ironworks is healthy!"
                HEALTHY=1
                break
              fi
              sleep 2
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "==> ERROR: Health check timed out after 60s"
              docker compose -f docker-compose.production.yml logs --tail=50
              exit 1
            fi

            echo "==> Verifying VPS HEAD matches pushed commit..."
            ACTUAL_SHA=$(git rev-parse HEAD)
            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "==> ERROR: VPS HEAD ($ACTUAL_SHA) does not match expected ($EXPECTED_SHA)"
              echo "==> Deploy appears to have silently reverted or a race occurred."
              exit 1
            fi
            echo "==> VPS HEAD == $EXPECTED_SHA ✓"

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::Telegram alert secrets not configured; skipping notification"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="⚠️ IronWorks deploy FAILED for ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7}. ${RUN_URL}"
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null || true
