name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

# Deploy routes through Tailscale rather than the public internet because GH
# Actions runners (Azure egress) → Hostinger public SSH has been blackholing
# at the TCP dial layer (`dial tcp ***:22: i/o timeout`). Three consecutive
# deploys plus a 3-attempt retry workflow all hit the same 60s timeout without
# any VPS-side firewall block (no fail2ban hits, no ufw, no iptables drops).
# The block appears to be Hostinger-side throttling of the GH runner IP range.
#
# Tailscale gives us a private mesh that bypasses this entirely: the runner
# joins the tailnet for the duration of the job, then ssh's to the VPS at its
# 100.x.y.z Tailscale IP — same packets, completely different routing path.
#
# Required GH secrets:
#   - TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET — Tailscale OAuth client (preferred
#     over reusable auth keys; rotates automatically and scopes via tags).
#     Create at https://login.tailscale.com/admin/settings/oauth with
#     "Devices" write scope, tag `tag:ci`.
#   - VPS_TAILSCALE_HOST — Tailscale IP of ironworks-vps (e.g. 100.93.111.58)
#   - VPS_SSH_KEY — unchanged, the existing deploy private key
#   - TELEGRAM_ALERT_BOT_TOKEN / TELEGRAM_ALERT_CHAT_ID — unchanged
#
# Required Tailscale ACL update (admin → Access controls):
#   ACLs must allow `tag:ci` to ssh to `tag:atlas-vps` (or whatever tag the
#   ironworks-vps node carries). Without this the runner joins the tailnet
#   but cannot SSH to the VPS.
jobs:
  deploy:
    name: Deploy to Ironworks VPS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Join Tailscale network
        # Pin to a specific SHA before merging to production. Using the v2
        # tag here for initial review; SHA-pin in a follow-up.
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # ACCEPT_DNS=false keeps the runner's resolver pointed at GitHub's
          # default rather than Tailscale's MagicDNS. We use the Tailscale IP
          # directly, so MagicDNS isn't needed and disabling it avoids surprise
          # DNS resolution behavior in the build environment.
          args: --accept-dns=false

      - name: Set up SSH key + known_hosts
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_TAILSCALE_HOST: ${{ secrets.VPS_TAILSCALE_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # ssh-keyscan over the Tailscale IP. Generally faster than over WAN
          # and Tailscale's WireGuard tunnel doesn't drop the way the public
          # path was. -T 30 still defended against transient slowness.
          ssh-keyscan -T 30 -t ed25519,rsa "$VPS_TAILSCALE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Stage deploy script
        run: |
          cat > /tmp/deploy.sh <<'SCRIPT'
          set -euo pipefail
          cd /root/ironworks-atlas

          echo "==> Expected SHA: ${EXPECTED_SHA}"
          echo "==> Pulling latest from master (preserving VPS-local prod compose hardening)..."
          git fetch origin master
          # VPS has intentional local diverges on docker-compose.production.yml
          # (pg17 pin vs master's pg18, 127.0.0.1 binding, dropped :5432 publish).
          # Stash those before reset, then restore.
          if ! git diff --quiet docker-compose.production.yml; then
            git stash push -m "vps-prod-hardening-$(date +%s)" -- docker-compose.production.yml
            STASHED=1
          else
            STASHED=0
          fi
          git reset --hard origin/master
          if [ "$STASHED" = "1" ]; then
            git stash pop
          fi

          echo "==> Rebuilding and restarting atlas stack (no compose down - preserves volumes)..."
          docker compose -f docker-compose.production.yml up -d --build

          echo "==> Pruning old images..."
          docker image prune -f

          echo "==> Waiting for health check on :3101..."
          HEALTHY=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3101/api/health > /dev/null 2>&1; then
              echo "==> Ironworks is healthy!"
              HEALTHY=1
              break
            fi
            sleep 2
          done

          if [ "$HEALTHY" = "0" ]; then
            echo "==> ERROR: Health check timed out after 60s"
            docker compose -f docker-compose.production.yml logs --tail=50
            exit 1
          fi

          echo "==> Verifying VPS HEAD matches pushed commit..."
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "==> ERROR: VPS HEAD ($ACTUAL_SHA) does not match expected ($EXPECTED_SHA)"
            echo "==> Deploy appears to have silently reverted or a race occurred."
            exit 1
          fi
          echo "==> VPS HEAD == $EXPECTED_SHA ✓"
          SCRIPT

      - name: Deploy via SSH over Tailscale (with 3-attempt retry for transient WireGuard handshake delay)
        env:
          EXPECTED_SHA: ${{ github.sha }}
          VPS_TAILSCALE_HOST: ${{ secrets.VPS_TAILSCALE_HOST }}
        run: |
          set -uo pipefail
          # Tailscale's first connection sometimes pays a WireGuard handshake
          # latency cost. ConnectTimeout=30 is plenty over the tailnet
          # (typical RTT is sub-100ms once peers are in sync). The 3-attempt
          # retry remains as a small belt-and-suspenders for the rare
          # initial-handshake-slowness case.
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o ConnectTimeout=30
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=20
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o LogLevel=ERROR
          )
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "==> Deploy attempt $attempt/$MAX_ATTEMPTS via tailscale ${VPS_TAILSCALE_HOST}"
            if ssh "${SSH_OPTS[@]}" "root@${VPS_TAILSCALE_HOST}" \
                 "EXPECTED_SHA='${EXPECTED_SHA}' bash -s" < /tmp/deploy.sh; then
              echo "==> Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              wait=$((attempt * 15))
              echo "==> Attempt $attempt failed; sleeping ${wait}s before retry..."
              sleep "$wait"
            fi
          done
          echo "==> ERROR: All $MAX_ATTEMPTS tailscale-routed deploy attempts failed"
          echo "==> Check tailscale ACLs: tag:ci must be allowed to ssh tag:atlas-vps"
          exit 1

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_ALERT_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::Telegram alert secrets not configured; skipping notification"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="⚠️ IronWorks deploy FAILED for ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7}. ${RUN_URL}"
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null || true
