name: E2E Tests

on:
  pull_request:
    branches: [master]
    paths:
      - "server/src/**"
      - "ui/src/**"
      - "packages/**"
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM-dependent assertions (default: true)"
        type: boolean
        default: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Validate e2e test files compile
        # Fast preflight: catch bad imports, syntax errors, missing symbols before
        # spinning up the full server + browser lifecycle. Fails fast if test specs don't parse.
        run: pnpm playwright test --list --config tests/e2e/playwright.config.ts

      - run: npx playwright install --with-deps chromium

      - name: Seed e2e onboard config
        # ironworksai run exits early with "No config found and terminal is non-interactive"
        # when ~/.ironworks/instances/default/config.json is absent. This step writes the
        # minimum valid config (matches the Zod schema in packages/shared/src/config-schema.ts)
        # so the server boots without an interactive onboarding session.
        # local_trusted + embedded-postgres is the zero-dependency path: no external DB,
        # no auth URL, no storage credentials required.
        run: |
          mkdir -p ~/.ironworks/instances/default
          cat > ~/.ironworks/instances/default/config.json << 'CONF'
          {
            "$meta": { "version": 1, "updatedAt": "2026-01-01T00:00:00.000Z", "source": "onboard" },
            "database": { "mode": "embedded-postgres" },
            "logging": { "mode": "file" },
            "server": { "deploymentMode": "local_trusted", "host": "127.0.0.1", "port": 3100 },
            "auth": { "baseUrlMode": "auto" },
            "storage": { "provider": "local_disk" },
            "secrets": { "provider": "local_encrypted", "strictMode": false }
          }
          CONF

      - name: Run e2e tests
        env:
          # IRONWORKS_E2E_SKIP_LLM defaults to true in the test file unless explicitly set to
          # "false". On PR triggers inputs.skip_llm is undefined, so the old expression
          # `inputs.skip_llm && 'true' || 'false'` evaluated to 'false', enabling LLM
          # assertions that require a real ANTHROPIC_API_KEY. CI runs without that key, so
          # we hard-wire 'true' here and let the workflow_dispatch input only affect manual runs.
          IRONWORKS_E2E_SKIP_LLM: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_llm == false) && 'false' || 'true' }}
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14
