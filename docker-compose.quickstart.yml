services:
  ironworks:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${IRONWORKS_PORT:-3100}:3100"
    extra_hosts:
      # Map host.docker.internal to the host gateway IP so container reaches
      # local Ollama on the host (port 11434) for nomic-embed-text embeddings.
      - "host.docker.internal:host-gateway"
    environment:
      HOST: "0.0.0.0"
      IRONWORKS_HOME: "/ironworks"
      DATABASE_URL: "${DATABASE_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      OLLAMA_EMBED_URL: "${OLLAMA_EMBED_URL:-}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      IRONWORKS_DEPLOYMENT_MODE: "authenticated"
      IRONWORKS_DEPLOYMENT_EXPOSURE: "private"
      IRONWORKS_PUBLIC_URL: "${IRONWORKS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      IRONWORKS_SECRETS_MASTER_KEY_FILE: "${IRONWORKS_SECRETS_MASTER_KEY_FILE:-/ironworks/instances/default/secrets.key}"
    volumes:
      - "${IRONWORKS_DATA_DIR:-./data/docker-ironworks}:/ironworks"
    networks:
      - ironworks_default

networks:
  ironworks_default:
    external: true
